<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窗冥——诗歌集</title>
    <style>
        /* 简单的样式，让PDF占满整个页面 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* 隐藏滚动条，让PDF自己处理滚动 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="moyan.pdf" type="application/pdf" width="100%" height="100%" frameborder='none'></iframe>

    <script>
        // 简单检测 iframe 是否加载失败（极少数情况）
        const embedElem = document.querySelector('iframe');
        if (embedElem) {
            embedElem.onerror = function() {
                location.href='moyan.pdf';
            };
        }
    </script>
</body>
</html>
