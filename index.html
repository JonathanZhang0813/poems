<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>窗冥——诗歌集</title>
    <style>
        /* 简单的样式，让PDF占满整个页面 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* 隐藏滚动条，让PDF自己处理滚动 */
        }
        embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* 可选：为不支持PDF的浏览器添加提示 */
        .fallback {
            text-align: center;
            padding: 50px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- 方式一：使用 embed 标签（推荐，兼容性好，显示更原生） -->
    <embed src="moyan.pdf" type="application/pdf" width="100%" height="100%">

    <!-- 方式二：如果上面方式不生效，可以取消下面代码的注释，并注释掉上面那行 -->
    <!-- <iframe src="manual.pdf" width="100%" height="100%"></iframe> -->

    <!-- 简单的降级提示：如果浏览器实在无法显示PDF -->
    <div class="fallback" style="display: none;">
        <p>您的浏览器无法直接预览PDF文件。<br>
        请 <a href="manual.pdf" download>点击此处下载文件</a> 后查看。</p>
    </div>

    <script>
        // 简单检测 embed 是否加载失败（极少数情况）
        const embedElem = document.querySelector('embed');
        if (embedElem) {
            embedElem.onerror = function() {
                document.querySelector('.fallback').style.display = 'block';
                embedElem.style.display = 'none';
            };
        }
    </script>
</body>
</html>
